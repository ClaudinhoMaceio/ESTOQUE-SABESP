<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Técnico - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --glass-bg: rgba(10, 15, 28, 0.95); --neon-blue: #38bdf8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #04070d; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Proteção visual: impede seleção de texto */
        * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 50px -12px rgba(0,0,0,0.6); }
        .item-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .item-card:hover { transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.4); background: rgba(15, 23, 42, 0.95); }
        .category-tab.active { background: white; color: #0f172a; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        
        /* Overlay de Segurança */
        #security-overlay { position: fixed; inset: 0; z-index: 9999; background: #04070d; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(50px); }
        .lock-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(56,189,248,0.2); color: white; text-align: center; letter-spacing: 0.5em; font-family: 'JetBrains Mono', monospace; }
        
        main { flex: 1; display: none; } /* Escondido até validar senha */
    </style>
</head>
<body oncontextmenu="return false"> <!-- Bloqueia Clique Direito -->

    <!-- TELA DE SEGURANÇA -->
    <div id="security-overlay">
        <div class="max-w-md w-full p-8 text-center">
            <div class="mb-8 inline-flex p-6 bg-sky-500/10 rounded-full border border-sky-500/20">
                <i data-lucide="shield-check" class="w-12 h-12 text-sky-400"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">ACESSO RESTRITO</h2>
            <p class="text-slate-500 text-sm mb-8 uppercase tracking-widest">Introduza a chave de encriptação</p>
            
            <input type="password" id="access-key" class="lock-input w-full py-4 rounded-2xl mb-4 focus:outline-none focus:border-sky-500 transition-all" placeholder="••••">
            <button onclick="_validate()" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-sky-400 transition-all uppercase tracking-tighter">Desbloquear Sistema</button>
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 font-bold opacity-0 uppercase">Chave de acesso incorreta</p>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL (Protegido) -->
    <main id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8">
            <div class="flex items-center gap-5">
                <div class="relative p-5 bg-slate-900 border border-slate-700 rounded-[2rem] shadow-2xl">
                    <i data-lucide="database" class="text-sky-400 w-10 h-10"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black tracking-tighter italic text-white uppercase leading-none">
                        Estoque<span class="text-sky-400 not-italic font-light"> Técnico</span>
                    </h1>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2 italic">Protegido por Claudinho CSMM</p>
                </div>
            </div>
            <div class="glass-card px-8 py-4 rounded-3xl border border-slate-800 flex flex-col items-center min-w-[160px]">
                <span id="total-count" class="text-sky-400 font-mono text-3xl font-bold">0</span>
                <span class="text-slate-500 text-[9px] uppercase font-bold tracking-widest mt-1">Itens Ativos</span>
            </div>
        </header>

        <div class="relative mb-10">
            <input type="text" id="search-input" placeholder="PESQUISAR NA BASE DE DADOS..." class="w-full bg-slate-950/80 border border-slate-800 rounded-[2rem] py-7 px-20 text-xl font-medium focus:outline-none focus:border-sky-500 transition-all uppercase tracking-wider">
            <div class="absolute inset-y-0 left-8 flex items-center"><i data-lucide="search" class="text-sky-500/50 w-6 h-6"></i></div>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-8 mb-4" id="category-tabs">
            <button onclick="selectCategory('all', this)" class="category-tab active whitespace-nowrap px-8 py-3 rounded-2xl glass-card text-xs font-black uppercase tracking-widest">Tudo</button>
        </div>

        <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 italic"></div>
        <div id="empty-state" class="hidden flex-col items-center justify-center py-40 text-slate-600 italic">Nenhum resultado encontrado.</div>
    </main>

    <!-- Rodapé Atualizado -->
    <footer id="main-footer" class="mt-auto pb-6 text-center border-t border-white/5 pt-8 hidden">
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em]">
            Desenvolvido por <span class="text-sky-400">Claudinho CSMM</span> © 2026
        </p>
    </footer>

    <script>
        /**
         * SEGURANÇA E TRAVA
         * Senha Padrão: 1234
         */
        const _MASTER_KEY = "1234"; 

        function _validate() {
            const input = document.getElementById('access-key').value;
            if (input === _MASTER_KEY) {
                document.getElementById('security-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-footer').style.display = 'block';
                render();
            } else {
                const msg = document.getElementById('error-msg');
                msg.style.opacity = '1';
                setTimeout(() => msg.style.opacity = '0', 2000);
            }
        }

        // Bloqueio de Teclas de Inspeção
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        const _inv = [{c:"30008103",i:"ABRACADEIR FF REPARO TUBO DN100 LMIN=150"},{c:"30004082",i:"ABRACADEIR FF REPARO TUBO DN125 LMIN=180"},{c:"30002141",i:"ABRACADEIR FF REPARO TUBO DN150 LMIN=205"},{c:"30001120",i:"ABRACADEIR FF REPARO TUBO DN200 LMIN=250"},{c:"30002142",i:"ABRACADEIR FF REPARO TUBO DN300 LMIN=400"},{c:"30004091",i:"ABRACADEIRA FF REPARO TUBO DN50 LMIN=150"},{c:"30001122",i:"ABRACADEIRA FF REPARO TUBO DN75 LMIN=150"},{c:"30001132",i:"ADAPT PVC PPVC X BFF REKA DN 100 X 100"},{c:"30000258",i:"ADAPT PVC PPVC X BFF REKA DN 50 X 50"},{c:"30008113",i:"ADAPT PVC PPVC X BFF REKA DN 75 X 75"},{c:"30004242",i:"ADAPTADOR FF PPVC X BFF DN 100 X DN 100"},{c:"30002028",i:"ADAPTADOR FF PPVC X BFF DN 50 X DN 50"},{c:"30000518",i:"ADAPTADOR FF PPVC X BFF DN 75 X DN 75"},{c:"30004246",i:"ADAPTADOR FF PPVC X BFF DN 75 X DN 80"},{c:"30004248",i:"ADAPTADOR P/TUBO PE - NTS 179 DE 32 MM"},{c:"30001136",i:"ADAPTADOR P/TUBO PE - NTS 179 DN 20"},{c:"30004251",i:"ADAPTADOR PVC BOLSA P/TUBO CERAM DN 150"},{c:"30001137",i:"ADAPTADOR PVC BOLSA P/TUBO CERAM DN 200"},{c:"30004252",i:"ADAPTADOR PVC BOLSA P/TUBO CERAM DN 250"},{c:"30002031",i:"ADAPTADOR PVC RIG P/ESG 100MM C/VED"},{c:"50000159",i:"CAIXA PLASTICA COMPLETA UMA NTS 303"},{c:"30000563",i:"CAP FF DUCTIL BOLSA JE2GS DN100"},{c:"30000032",i:"CAP FF DUCTIL BOLSA JE2GS DN50"},{c:"30004410",i:"CAP FF DUCTIL BOLSA JE2GS DN75"},{c:"30001055",i:"CAP FF PARA PVC DN 100"},{c:"30002356",i:"CAP FF PARA PVC DN 50"},{c:"30000564",i:"CAP FF PARA PVC DN 75"},{c:"30004703",i:"COLAR TOMADA INOX DN200 A 300 X DN20"},{c:"30004704",i:"COLAR TOMADA INOX DN50 A 150 X DN20"},{c:"30016004",i:"COLARINHO 200 LONGO SDR11 PE100"},{c:"30002222",i:"COLARINHO 315 LONGO SDR11 PN10"},{c:"30002394",i:"CONEXAO METAL LIGACAO FEMEA DN20"},{c:"30002421",i:"COTOVELO 45 ELETROFUSAO 315 PE100"},{c:"30010675",i:"COTOVELO 90 ELETROFUSAO 315 PE100"},{c:"30008287",i:"COTOVELO 90 PVC DN25"},{c:"30005264",i:"CURVA 45 PVC DN100"},{c:"30005265",i:"CURVA 45 PVC DN50"},{c:"30008307",i:"CURVA 45 PVC DN75"},{c:"30005142",i:"CURVA 90 PVC DN100"},{c:"30001210",i:"CURVA 90 PVC DN75"},{c:"30000139",i:"CURVA 90 ESG DN150"},{c:"50000021",i:"DISPOSITIVO MEDICAO METAL DN20"},{c:"30005350",i:"FITA TEFLON"},{c:"50000318",i:"GUARNICAO DN20"},{c:"50000108",i:"HIDROMETRO DN20 QN0,75"},{c:"50001460",i:"HIDROMETRO DN20 Q3 2,5"},{c:"30005601",i:"JUNTA FF VARIAVEL 150 X 100"},{c:"30008409",i:"JUNTA FF VARIAVEL 175 X 125"},{c:"30005602",i:"JUNTA FF VARIAVEL 200 X 150"},{c:"30005615",i:"JUNTA FLEX ESGOTO 100"},{c:"30001528",i:"JUNTA FLEX ESGOTO 150"},{c:"30000616",i:"JUNTA GIBAULT DN100"},{c:"30005630",i:"JUNTA GIBAULT DN150"},{c:"50001070",i:"LACRE HIDROMETRO 1M"},{c:"50001071",i:"LACRE HIDROMETRO 1,2M"},{c:"30005887",i:"LUVA BIPARTIDA DN100"},{c:"30001546",i:"LUVA BIPARTIDA DN150"},{c:"30005894",i:"LUVA CORRER ESG DN100"},{c:"30005895",i:"LUVA CORRER ESG DN150"},{c:"30005746",i:"LUVA ELETROFUSAO 110 PE100"},{c:"30005771",i:"LUVA PVC DN100"},{c:"30005772",i:"LUVA PVC DN50"},{c:"30003288",i:"NIPLE DUPLO PVC DN25"},{c:"30006931",i:"REDUCAO PVC 100 X 50"},{c:"30001607",i:"REDUCAO PVC 100 X 75"},{c:"30008625",i:"REGISTRO METAL DN20"},{c:"30000978",i:"SELIM PVC 150 X 100"},{c:"50000143",i:"SUPORTE ADAPTADOR PLASTICO"},{c:"30000987",i:"TE ELETROFUSAO 315"},{c:"30000211",i:"TE SERVICO 100 X 20"},{c:"30008695",i:"TE DUCTIL DN100"},{c:"50000306",i:"TUBETE CURTO DN20"},{c:"50000150",i:"TUBETE LONGO DN20"},{c:"30028862",i:"TUBO PBA DN50"},{c:"30028863",i:"TUBO PBA DN75"},{c:"30007888",i:"TUBO PEAD 160 PN16"},{c:"30001848",i:"TUBO PEAD DN20"},{c:"30028856",i:"TUBO ESG DN100"},{c:"30028858",i:"TUBO ESG DN200"},{c:"30028860",i:"TUBO PVC RIG JEI/JERI ESG DN 300 CM 6M"},{c:"30028857",i:"TUBO PVC RIG P/ESG; OCR; 150MM;C/VED; COLET"},{c:"30028767",i:"TUBO PVC-O DN100"},{c:"30028768",i:"TUBO PVC-O DN150"},{c:"30028769",i:"TUBO PVC-O PN 12,5 AGUA DN 200 CM 6M"},{c:"30031773", i:"UNIAO PE DN20"},{c:"30031774",i:"UNIAO PE DN32"},{c:"30001875",i:"VALVULA GAVETA DN50"},{c:"30007805",i:"VALVULA GAVETA DN100"},{c:"30007984",i:"VENTOSA DN50"}].sort((a,b)=>a.i.localeCompare(b.i));

        const _cats = {"Tubos":["TUBO","PBA","PEAD","PVC-O","OCR"],"Abraçadeiras":["ABRACADEIR","COLAR TOMADA"],"Conexões":["TE ","CURVA","COTOVELO","LUVA","CAP","REDUCAO","SELIM"],"Adaptação":["ADAPTADOR","ADAPT","NIPLE","UNIAO","TUBETE","COLARINHO"],"Medição":["HIDROMETRO","LACRE","DISPOSITIVO"],"Válvulas":["VALVULA","REGISTRO","VENTOSA"],"Juntas":["JUNTA"],"Outros":["CAIXA","FITA","GUARNICAO","SUPORTE","CONEXAO"]};

        let _curr = 'all';

        function getCat(n){
            const u = n.toUpperCase();
            for(const [k,v] of Object.entries(_cats)) if(v.some(x=>u.includes(x))) return k;
            return "Diversos";
        }

        function render(){
            const q = document.getElementById('search-input').value.toLowerCase();
            const g = document.getElementById('results-grid');
            const f = _inv.filter(x => (x.i.toLowerCase().includes(q) || x.c.includes(q)) && (_curr === 'all' || getCat(x.i) === _curr));
            
            document.getElementById('total-count').innerText = f.length;
            g.innerHTML = f.map(x => `
                <div class="item-card glass-card p-6 rounded-[2rem] border-l-4 border-l-sky-500/30">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-sky-500/10 text-sky-400 font-mono text-[10px] px-3 py-1 rounded-lg border border-sky-500/20">CÓDIGO: <span class="text-white font-bold">${x.c}</span></span>
                        <span class="text-[9px] font-black uppercase text-slate-600">${getCat(x.i)}</span>
                    </div>
                    <h3 class="text-white font-bold text-sm uppercase mb-4">${x.i}</h3>
                    <div class="pt-4 border-t border-white/5 flex justify-between"><span class="text-[8px] font-bold text-slate-500 italic uppercase">Inventário Seguro</span><i data-lucide="shield" class="w-3 h-3 text-slate-700"></i></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectCategory(c, b){
            _curr = c;
            document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
            b.classList.add('active');
            render();
        }

        window.onload = () => {
            const container = document.getElementById('category-tabs');
            Object.keys(_cats).forEach(c => {
                const b = document.createElement('button');
                b.className = 'category-tab whitespace-nowrap px-8 py-3 rounded-2xl glass-card text-xs font-black uppercase text-slate-500';
                b.textContent = c;
                b.onclick = (e) => selectCategory(c, e.target);
                container.appendChild(b);
            });
            document.getElementById('search-input').oninput = render;
            lucide.createIcons();
        };
    </script>
</body>
</html>
